<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Manager Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
  <h2>💰 MoneyPro</h2>
  <button onclick="showSection('dashboard')">Dashboard</button>
  <button onclick="showSection('add')">Add</button>
  <button onclick="showSection('history')">History</button>
</div>

<div class="main">

  <!-- Dashboard -->
  <div id="dashboard" class="section">
    <h2>Dashboard</h2>
    <div class="cards">
      <div class="card income">Income ₹<span id="income">0</span></div>
      <div class="card expense">Expense ₹<span id="expense">0</span></div>
      <div class="card balance">Balance ₹<span id="balance">0</span></div>
    </div>

    <canvas id="chart"></canvas>
  </div>

  <!-- Add Transaction -->
  <div id="add" class="section hidden">
    <h2>Add Transaction</h2>
    <input type="text" id="desc" placeholder="Description">
    <input type="number" id="amount" placeholder="Amount">

    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <select id="category">
      <option>Food</option>
      <option>Travel</option>
      <option>Shopping</option>
      <option>Other</option>
    </select>

     <button onclick="addTransaction()">Add</button>
  </div>

  <!-- History -->
  <div id="history" class="section hidden">
    <h2>History</h2>
    <ul id="list"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
